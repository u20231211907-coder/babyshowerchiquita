<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baby Shower - Lista de Regalos</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        /* Variables de estilo principal */
        :root {
            --bg-color: #fdfaf2;
            --card-bg: #ffffff;
            --text-dark: #4a3d30;
            --text-muted: #7d6c5a;
            --accent: #f2ba36;
            --accent-light: #fef8ed;
            --border-color: #f5ebd0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Fredoka', 'Montserrat', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
        }

        /* Contenedor tipo tarjeta */
        .invitation-container {
            width: 100%;
            max-width: 420px;
            background: var(--card-bg);
            border-radius: 35px;
            overflow: hidden;
            box-shadow: 0 12px 35px rgba(80, 68, 67, 0.08);
            border: 1px solid rgba(242, 186, 54, 0.12);
        }

        /* 1. SECCIÓN SUPERIOR CON PANAL DE ABEJA Y ABEJA TIERNA */
        .hero-banner {
            position: relative;
            width: 100%;
            height: 250px;
            /* Fondo de panal CSS */
            background-color: #fcefdc;
            background-image: 
                radial-gradient(circle at 50% 50%, transparent 45%, #ffffff 45%, #ffffff 55%, transparent 55%),
                radial-gradient(circle at 100% 100%, transparent 45%, #ffffff 45%, #ffffff 55%, transparent 55%),
                radial-gradient(circle at 0% 0%, transparent 45%, #ffffff 45%, #ffffff 55%, transparent 55%);
            background-size: 28px 48px;
            background-position: 0 0, 14px 24px, 14px 24px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 10px;
            border-bottom: 4px dashed #f2ba36;
        }

        /* Abejita tierna SVG flotante */
        .bee-illustration {
            width: 110px;
            height: 110px;
            filter: drop-shadow(0 5px 10px rgba(242, 186, 54, 0.2));
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-7px); }
        }

        .hero-title {
            font-size: 1.45rem;
            font-weight: 700;
            color: #5c493c;
            text-align: center;
            margin-top: 12px;
            line-height: 1.25;
            padding: 0 15px;
            text-shadow: 1px 1px 2px white;
        }

        /* 2. COLUMNA DERECHA: MURO INTERACTIVO */
        .content-section {
            padding: 25px 20px;
        }

        .wall-header {
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px dashed var(--border-color);
            text-align: center;
        }

        .wall-header h2 {
            font-size: 1.6rem;
            color: var(--text-dark);
        }

        /* Formulario para agregar regalo */
        .gift-form {
            background-color: #fdfaf5;
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 25px;
            border: 1px solid var(--border-color);
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            font-family: 'Montserrat', sans-serif;
            background-color: #ffffff;
            color: var(--text-dark);
            outline: none;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            border-color: var(--accent);
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background-color: #5c493c;
            color: #ffffff;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Fredoka', sans-serif;
            font-size: 1rem;
            transition: background 0.3s, transform 0.1s;
        }

        .submit-btn:hover {
            background-color: #45362c;
        }

        .submit-btn:active {
            transform: scale(0.98);
        }

        /* Lista de mensajes tipo tarjetas */
        .gifts-list {
            max-height: 400px;
            overflow-y: auto;
            padding-right: 5px;
        }

        .gift-card {
            background-color: #ffffff;
            border-left: 5px solid var(--accent);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
            border-top: 1px solid #f9f5f0;
            border-right: 1px solid #f9f5f0;
            border-bottom: 1px solid #f9f5f0;
            display: flex;
            align-items: center;
        }

        .gift-card-content {
            display: flex;
            align-items: center;
            gap: 15px;
            width: 100%;
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: #fdf6e2;
            color: #b88d2a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 1.1rem;
            text-transform: uppercase;
        }

        .gift-details h4 {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-dark);
        }

        .gift-details p {
            font-size: 0.95rem;
            color: var(--text-muted);
            margin-top: 2px;
        }

        /* Responsivo para celulares */
        @media (max-width: 500px) {
            .hero-card {
                height: 380px;
            }
            .hero-title {
                font-size: 1.3rem;
            }
        }
    </style>
</head>
<body>

    <div class="invitation-container">
        
        <div class="hero-banner">
            <svg class="bee-illustration" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                <ellipse cx="38" cy="35" rx="14" ry="10" fill="#E6F4F8" stroke="#B8DCE5" stroke-width="2.5" transform="rotate(-30 38 35)"/>
                <ellipse cx="62" cy="35" rx="14" ry="10" fill="#E6F4F8" stroke="#B8DCE5" stroke-width="2.5" transform="rotate(30 62 35)"/>
                
                <path d="M42 35 C40 25, 33 24, 31 27" stroke="#4a3d30" stroke-width="2.5" stroke-linecap="round"/>
                <circle cx="30" cy="28" r="3.5" fill="#f2ba36"/>
                
                <path d="M58 35 C60 25, 67 24, 69 27" stroke="#4a3d30" stroke-width="2.5" stroke-linecap="round"/>
                <circle cx="70" cy="28" r="3.5" fill="#f2ba36"/>

                <ellipse cx="50" cy="55" rx="24" ry="20" fill="#FFD56B"/>
                
                <path d="M38 40 C43 38, 57 38, 62 40 C61 42, 39 42, 38 40 Z" fill="#4a3d30"/>
                <path d="M30 52 C38 48, 62 48, 70 52 C68 56, 32 56, 30 52 Z" fill="#4a3d30"/>
                <path d="M34 64 C40 60, 60 60, 66 64 C62 68, 38 68, 34 64 Z" fill="#4a3d30"/>

                <circle cx="42" cy="48" r="3.5" fill="#4a3d30"/>
                <circle cx="41" cy="46.5" r="1.2" fill="#FFFFFF"/>
                
                <circle cx="58" cy="48" r="3.5" fill="#4a3d30"/>
                <circle cx="57" cy="46.5" r="1.2" fill="#FFFFFF"/>

                <path d="M47 53 Q50 56 53 53" stroke="#4a3d30" stroke-width="2" stroke-linecap="round" fill="none"/>

                <circle cx="37" cy="51" r="2.5" fill="#FF8E95" opacity="0.6"/>
                <circle cx="63" cy="51" r="2.5" fill="#FF8E95" opacity="0.6"/>
            </svg>
            
            <h1 class="hero-title">Una princesita<br>llega a endulzar<br>nuestras vidas</h1>
        </div>

        <div class="content-section">
            <div class="wall-header">
                <h2>Regalos Confirmados 🎁</h2>
            </div>

            <form class="gift-form" id="giftForm">
                <div class="form-group">
                    <label for="name">Tu Nombre</label>
                    <input type="text" id="name" placeholder="Ej. Juancho, o Anónimo">
                </div>
                <div class="form-group">
                    <label for="gift">¿Qué regalo vas a llevar?</label>
                    <input type="text" id="gift" placeholder="Ej. Coche, Pañales (Etapa 2-3-4)..." required>
                </div>
                <button type="submit" class="submit-btn">Confirmar Regalo ✨</button>
            </form>

            <div class="gifts-list" id="giftsList">
                </div>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = "https://cgabvvmxxhdgpqewcjhw.supabase.co";
        const SUPABASE_ANON_KEY = "EyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNnYWJ2dm14eGhkZ3BxZXdjamh3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQwNjAwODEsImV4cCI6Mj95NjMwODF9.vAwlSSBNJDTg4bm0ZG6QB3O96kJjaHkVSMijPbOf-VU";

        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const giftForm = document.getElementById('giftForm');
        const giftsList = document.getElementById('giftsList');

        // Cargar los regalos existentes de la base de datos
        async function loadGifts() {
            try {
                let { data: gifts, error } = await supabase
                    .from('gifts')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) {
                    console.error("Error cargando regalos:", error);
                    giftsList.innerHTML = `<p style="color: red; text-align: center; font-size: 0.9rem;">Error al conectar con la base de datos.</p>`;
                    return;
                }

                giftsList.innerHTML = '';
                
                if (!gifts || gifts.length === 0) {
                    giftsList.innerHTML = `<p style="color: var(--text-muted); text-align: center; font-size: 0.9rem; margin-top: 20px;">¡Aún no hay regalos! Sé el primero en confirmar ✨</p>`;
                    return;
                }

                gifts.forEach(gift => {
                    const displayName = gift.name && gift.name.trim() !== '' ? gift.name : 'Anónimo';
                    const firstLetter = displayName.charAt(0);
                    const card = document.createElement('div');
                    card.className = 'gift-card';
                    card.innerHTML = `
                        <div class="gift-card-content">
                            <div class="avatar">${firstLetter}</div>
                            <div class="gift-details">
                                <h4>${displayName}</h4>
                                <p>🎁 ${gift.gift_item}</p>
                            </div>
                        </div>
                    `;
                    giftsList.appendChild(card);
                });
            } catch (err) {
                console.error("Error general en loadGifts:", err);
            }
        }

        // Evento al enviar el formulario (BLINDADO CONTRA RECARGAS)
        if (giftForm) {
            giftForm.addEventListener('submit', async (e) => {
                // EVITAR que la página se recargue pase lo que pase
                e.preventDefault();
                e.stopPropagation();
                
                try {
                    // Buscamos los inputs por sus IDs exactos
                    const nameInput = document.getElementById('name');
                    const giftInput = document.getElementById('gift');

                    if (!giftInput) {
                        alert("Error: No se pudo encontrar el campo del regalo en el diseño.");
                        return;
                    }

                    let name = nameInput ? nameInput.value.trim() : 'Anónimo';
                    if (name === '') name = 'Anónimo';
                    
                    const gift_item = giftInput.value.trim();
                    if (gift_item === '') {
                        alert("Por favor, escribe qué regalo vas a llevar.");
                        return;
                    }

                    // Insertar datos en Supabase
                    const { data, error } = await supabase
                        .from('gifts')
                        .insert([{ name: name, gift_item: gift_item }])
                        .select();

                    if (error) {
                        alert("Error de base de datos: " + error.message);
                        console.error(error);
                    } else {
                        // Limpiar formulario sin recargar
                        if (nameInput) nameInput.value = '';
                        giftInput.value = '';
                        alert("¡Regalo confirmado con éxito! 🎉");
                        // Actualizar la lista en pantalla inmediatamente
                        await loadGifts();
                    }
                } catch (err) {
                    // Si ocurre un error en el código, lo atrapamos aquí para que no recargue la página y lo muestre
                    alert("Ocurrió un error en el script: " + err.message);
                    console.error(err);
                }
            });
        }

        // Inicializar al cargar la página
        loadGifts();
    </script>
</body>
</html>
